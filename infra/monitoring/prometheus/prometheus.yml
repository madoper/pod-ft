global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "podft-gateway"
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
