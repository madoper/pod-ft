# pod-ft VPS nginx config for production
# Place at /etc/nginx/sites-available/podft
# ln -s /etc/nginx/sites-available/podft /etc/nginx/sites-enabled/
# certbot handles SSL certs

upstream gateway {
    server localhost:8000;
}

upstream web_frontend {
    server localhost:8080;
}

server {
    listen 80;
    server_name vectornode.ru www.vectornode.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vectornode.ru www.vectornode.ru;

    ssl_certificate /etc/letsencrypt/live/vectornode.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vectornode.ru/privkey.pem;

    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
