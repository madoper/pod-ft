# pod-ft VPS nginx config for production
# Place at /etc/nginx/sites-available/podft
# ln -s /etc/nginx/sites-available/podft /etc/nginx/sites-enabled/
# certbot handles SSL certs

upstream gateway {
    server localhost:8000;
}

upstream web_frontend {
    server localhost:8080;
}

server {
    listen 80;
    server_name vectornode.ru www.vectornode.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vectornode.ru www.vectornode.ru;

    ssl_certificate /etc/letsencrypt/live/vectornode.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vectornode.ru/privkey.pem;

    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
    }

    location /superset/ {
        proxy_pass http://127.0.0.1:8088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /superset;
        proxy_set_header X-Script-Name /superset;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 50m;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Fallback for Superset static assets (for pages generated before X-Forwarded-Prefix took effect)
    location /static/ {
        proxy_pass http://127.0.0.1:8088/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /superset;
        proxy_buffering off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
