name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: podft
          POSTGRES_PASSWORD: podft-secret
          POSTGRES_DB: podft
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy backend/

      - name: Test
        run: uv run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: podft
          POSTGRES_PASSWORD: podft-secret
          POSTGRES_DB: podft

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME/gateway:latest -f backend/apps/gateway/Dockerfile .
          docker push $REGISTRY/$IMAGE_NAME/gateway:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 62.217.183.95
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/podft
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.monolith.yml pull gateway postgres qdrant redis minio nginx
            docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.monolith.yml up -d --force-recreate
            docker image prune -f
            echo "Deploy complete: $(date)"
